name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-release:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest, use-cross: true }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest, use-cross: true }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    env:
      BUILD_CMD: cargo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        run: |
          echo "PROJECT_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.job.target }}

      - name: Install cross (if needed)
        if: matrix.job.use-cross
        shell: bash
        run: |
          cargo install cross --locked
          echo "BUILD_CMD=cross" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: $BUILD_CMD build --release --locked --target ${{ matrix.job.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN_NAME="arc"
          ARCHIVE="arc-v${{ env.PROJECT_VERSION }}-${{ matrix.job.target }}.tar.gz"
          mkdir staging
          cp "target/${{ matrix.job.target }}/release/${BIN_NAME}" staging/
          cp README.md LICENSE staging/ 2>/dev/null || true
          cd staging
          tar czf "../${ARCHIVE}" *
          cd ..
          echo "ASSET=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BIN_NAME = "arc.exe"
          $ARCHIVE = "arc-v${{ env.PROJECT_VERSION }}-${{ matrix.job.target }}.zip"
          New-Item -ItemType Directory -Path staging
          Copy-Item "target/${{ matrix.job.target }}/release/$BIN_NAME" staging/
          Copy-Item README.md, LICENSE staging/ -ErrorAction SilentlyContinue
          Compress-Archive -Path staging/* -DestinationPath $ARCHIVE
          echo "ASSET=$ARCHIVE" >> $env:GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checksums:
    name: Generate checksums
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
      - name: Generate SHA256SUMS
        run: |
          sha256sum arc-v* > SHA256SUMS.txt 2>/dev/null || echo "No artifacts to checksum" > SHA256SUMS.txt
      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
