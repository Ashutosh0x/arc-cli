name: ARC Benchmarks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  benchmark:
    if: github.actor != 'dependabot[bot]'
    name: Run Criterion Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libasound2-dev
    - name: Cache Cargo Registry
      uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

    - name: Run Benchmarks
      run: cargo bench --bench sse_parser --bench config_parsing --bench checkpoint_io --bench hook_execution -- --output-format bencher | tee bench_output.txt

    - name: Publish Benchmark Results
      uses: rhysd/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1
      with:
        name: Rust Benchmark (Criterion)
        tool: 'cargo'
        output-file-path: bench_output.txt
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        # Show alert with commit comment on detecting performance regression
        alert-threshold: '150%'
        comment-on-alert: true
        fail-on-alert: true

