name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --workspace --lib

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev git

      - name: Run integration tests
        run: cargo test --workspace --tests

  property-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev

      - name: Run property-based tests
        run: cargo test --workspace --tests
        env:
          PROPTEST_CASES: 1000

  security-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev

      - name: Run security tests
        run: cargo test --workspace --tests

      - name: Run cargo-audit
        run: |
          cargo install cargo-audit
          cargo audit

      - name: Run cargo-deny
        run: |
          cargo install cargo-deny
          cargo deny check

  stress-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev

      - name: Run stress tests
        run: cargo test --workspace --tests -- --test-threads=1

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev

      - name: Clippy (focused security gates)
        run: |
          cargo clippy --workspace --all-targets -- \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::dbg_macro \
            -D clippy::suspicious_open_options \
            -D clippy::incompatible_msrv
