name: Release Binaries

on:
  workflow_dispatch:  # manual trigger for now
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: arc-${{ github.event.inputs.tag }}-x86_64-unknown-linux-musl.tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: arc-${{ github.event.inputs.tag }}-aarch64-unknown-linux-musl.tar.gz
          - target: x86_64-apple-darwin
            os: macos-13        # Intel
            artifact: arc-${{ github.event.inputs.tag }}-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-14        # Apple Silicon
            artifact: arc-${{ github.event.inputs.tag }}-aarch64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: arc-${{ github.event.inputs.tag }}-x86_64-pc-windows-msvc.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4 pinned SHA

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      # Cross-compile for Linux ARM64
      - name: Install cross (Linux ARM64 only)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            cross build --release --target ${{ matrix.target }} -p arc-code
          else
            cargo build --release --target ${{ matrix.target }} -p arc-code
          fi

      # Linux musl target needs musl-tools
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/arc staging/
          cp LICENSE README.md staging/
          
          # Include auto-completions and manpages
          COMPLETIONS_DIR=$(find target/${{ matrix.target }}/release/build -type d -name "completions" | head -n 1)
          MAN_DIR=$(find target/${{ matrix.target }}/release/build -type d -name "man" | head -n 1)
          if [ -n "$COMPLETIONS_DIR" ] && [ -d "$COMPLETIONS_DIR" ]; then cp -r "$COMPLETIONS_DIR" staging/; fi
          if [ -n "$MAN_DIR" ] && [ -d "$MAN_DIR" ]; then cp -r "$MAN_DIR" staging/; fi
          
          cd staging
          tar czf ../${{ matrix.artifact }} .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/arc.exe staging/
          cp LICENSE, README.md staging/ -ErrorAction SilentlyContinue
          
          $comps = Get-ChildItem -Path "target/${{ matrix.target }}/release/build" -Filter "completions" -Directory -Recurse | Select-Object -First 1
          $man = Get-ChildItem -Path "target/${{ matrix.target }}/release/build" -Filter "man" -Directory -Recurse | Select-Object -First 1
          if ($comps) { Copy-Item $comps.FullName -Destination staging/completions -Recurse -Force }
          if ($man) { Copy-Item $man.FullName -Destination staging/man -Recurse -Force }
          
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.artifact }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum arc-v* > SHA256SUMS.txt

      - name: Generate artifact attestation (Sigstore)
        uses: actions/attest-build-provenance@1c608d11d69870c2092266b3f9a6f3abbf17002c # v1
        with:
          subject-path: 'arc-v*'

      - name: Upload to existing release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            arc-v*
            SHA256SUMS.txt
