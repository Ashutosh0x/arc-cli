name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            artifact: arc-${{ inputs.tag }}-x86_64-unknown-linux-musl.tar.gz
            use_cross: true

          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            artifact: arc-${{ inputs.tag }}-aarch64-unknown-linux-musl.tar.gz
            use_cross: true

          - target: x86_64-apple-darwin
            os: macos-14
            artifact: arc-${{ inputs.tag }}-x86_64-apple-darwin.tar.gz
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-14
            artifact: arc-${{ inputs.tag }}-aarch64-apple-darwin.tar.gz
            use_cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: arc-${{ inputs.tag }}-x86_64-pc-windows-msvc.zip
            use_cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> $GITHUB_ENV
          fi

      - name: Install cross
        if: matrix.use_cross
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /usr/local/bin
          cross --version

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p arc-code
        env:
          CROSS_CONTAINER_OPTS: "--network host"

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} -p arc-code

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/arc staging/
          chmod +x staging/arc
          cp LICENSE README.md staging/ 2>/dev/null || true
          cd staging
          tar czf ../${{ matrix.artifact }} .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/arc.exe" staging/
          Copy-Item LICENSE, README.md staging/ -ErrorAction SilentlyContinue
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && contains(needs.build.result, 'success')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum arc-* > SHA256SUMS.txt

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            arc-*
            SHA256SUMS.txt
