version: 2
updates:
  # Cargo dependencies - conservative
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    versioning-strategy: lockfile-only
    labels:
      - "dependencies"
      - "cargo"

  # GitHub Actions - safe to auto-update
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
